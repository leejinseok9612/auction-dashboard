<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 아파트 경매 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=fb4b539cf2855399d173b666f110f1e8&libraries=services&autoload=false"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:#FFFFFF; --black:#1A1A1A; --gray-50:#F8F8F6; --gray-100:#F0F0EE;
      --gray-200:#E5E5E3; --gray-400:#9CA3AF; --gray-600:#6B7280;
      --yellow:#F5C400; --green:#16A34A; --green-bg:#DCFCE7;
      --red:#DC2626; --red-bg:#FEE2E2; --orange:#EA580C; --orange-bg:#FED7AA;
      --blue:#2563EB;
    }
    body { background:var(--white); color:var(--black); font-family:'Inter','Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size:15px; line-height:1.6; }

    /* ── NAV ── */
    nav { position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--gray-200); padding:0 48px; height:64px; display:flex; align-items:center; justify-content:space-between; }
    .nav-logo { display:flex; align-items:center; gap:10px; font-weight:800; font-size:17px; letter-spacing:-0.5px; text-decoration:none; color:var(--black); }
    .nav-logo-icon { width:34px; height:34px; background:var(--black); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; }
    .nav-right { display:flex; align-items:center; gap:10px; }
    .nav-pill { background:var(--yellow); color:var(--black); font-size:12px; font-weight:700; padding:5px 13px; border-radius:20px; letter-spacing:0.3px; }
    .nav-cta { background:var(--black); color:white; border:none; border-radius:9px; font-size:13px; font-weight:700; padding:9px 18px; cursor:pointer; text-decoration:none; font-family:inherit; }

    /* ── HERO ── */
    .hero { position:relative; overflow:hidden; background:var(--white); padding:96px 48px 72px; text-align:center; }
    .hero::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,#CECECE 1px,transparent 1px); background-size:24px 24px; opacity:0.55; pointer-events:none; }
    .hero::after  { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 65% 55% at 50% 50%,rgba(255,255,255,0) 0%,rgba(255,255,255,0.88) 65%,white 100%); pointer-events:none; }
    .hero-inner { position:relative; z-index:1; max-width:740px; margin:0 auto; }
    .hero-chip { display:inline-flex; align-items:center; gap:6px; background:var(--yellow); color:var(--black); font-size:12px; font-weight:800; padding:6px 16px; border-radius:20px; margin-bottom:28px; letter-spacing:0.6px; text-transform:uppercase; }
    .hero-h1 { font-size:60px; font-weight:900; line-height:1.05; letter-spacing:-2.5px; margin-bottom:6px; }
    .hero-h1 .light { color:var(--gray-400); font-weight:300; }
    .hero-sub { font-size:17px; color:var(--gray-600); margin-bottom:40px; }
    .hero-sub strong { color:var(--black); font-weight:700; }
    .hero-kpi { display:flex; justify-content:center; gap:40px; margin-bottom:40px; flex-wrap:wrap; }
    .kpi { text-align:center; }
    .kpi-num { font-size:38px; font-weight:900; letter-spacing:-1.5px; line-height:1; }
    .kpi-lbl { font-size:12px; color:var(--gray-600); margin-top:4px; font-weight:500; }
    .hero-btns { display:flex; justify-content:center; gap:12px; }
    .btn-dark { background:var(--black); color:white; border:2.5px solid var(--black); border-radius:12px; font-size:15px; font-weight:700; padding:14px 30px; cursor:pointer; font-family:inherit; transition:background 0.2s; }
    .btn-dark:hover { background:#333; }
    .btn-outline { background:white; color:var(--black); border:2.5px solid var(--gray-200); border-radius:12px; font-size:15px; font-weight:600; padding:14px 30px; cursor:pointer; font-family:inherit; transition:border-color 0.2s; }
    .btn-outline:hover { border-color:var(--black); }

    /* ── FILTER BAR ── */
    .fbar { background:var(--gray-50); border-top:1px solid var(--gray-200); border-bottom:1px solid var(--gray-200); padding:14px 48px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .fbar-left { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .fsel { background:white; border:1.5px solid var(--gray-200); border-radius:9px; color:var(--black); font-size:13px; font-weight:500; padding:8px 12px; outline:none; cursor:pointer; font-family:inherit; transition:border-color 0.2s; }
    .fsel:focus { border-color:var(--black); }
    .fsearch { background:white; border:1.5px solid var(--gray-200); border-radius:9px; color:var(--black); font-size:13px; padding:8px 14px; outline:none; width:220px; font-family:inherit; }
    .fsearch:focus { border-color:var(--black); }
    .fbar-right { display:flex; align-items:center; gap:10px; }
    .fcount { font-size:13px; color:var(--gray-600); font-weight:500; }
    .btn-reset { background:transparent; border:1.5px solid var(--gray-200); border-radius:9px; color:var(--gray-600); font-size:12px; font-weight:700; padding:7px 13px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .btn-reset:hover { border-color:var(--black); color:var(--black); }

    /* ── CARDS ── */
    .cards-wrap { padding:48px 48px 96px; max-width:1440px; margin:0 auto; }
    .sec-head { display:flex; align-items:baseline; gap:12px; margin-bottom:32px; }
    .sec-title { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
    .sec-sub { font-size:13px; color:var(--gray-400); font-weight:500; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:24px; }

    /* ── AUCTION CARD ── */
    .acard { background:white; border:1.5px solid var(--gray-200); border-radius:18px; overflow:hidden; cursor:pointer; transition:all 0.25s; }
    .acard:hover { border-color:var(--black); box-shadow:0 10px 40px rgba(0,0,0,0.12); transform:translateY(-3px); }
    .acard-img { height:190px; position:relative; overflow:hidden; display:flex; align-items:flex-end; padding:16px; }
    .acard-img .bg-district { position:absolute; bottom:-12px; right:14px; font-size:58px; font-weight:900; color:rgba(255,255,255,0.2); line-height:1; user-select:none; pointer-events:none; }
    .acard-img-stats { display:flex; gap:8px; position:relative; z-index:1; }
    .img-pill { background:rgba(255,255,255,0.22); backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.35); border-radius:7px; color:white; font-size:12px; font-weight:700; padding:4px 11px; }
    .badge-new { position:absolute; top:14px; left:14px; background:var(--yellow); color:var(--black); font-size:11px; font-weight:800; padding:3px 11px; border-radius:20px; letter-spacing:0.5px; text-transform:uppercase; z-index:2; }
    .badge-dday { position:absolute; top:14px; right:14px; font-size:12px; font-weight:700; padding:4px 11px; border-radius:20px; z-index:2; }
    .dd-urgent { background:rgba(220,38,38,0.88); color:white; }
    .dd-soon   { background:rgba(234,88,12,0.88); color:white; }
    .dd-ok     { background:rgba(22,163,74,0.80); color:white; }
    .acard-body { padding:20px; }
    .acard-court { font-size:11px; font-weight:700; color:var(--gray-600); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .acard-addr { font-size:16px; font-weight:700; letter-spacing:-0.3px; line-height:1.3; margin-bottom:3px; }
    .acard-addr2 { font-size:13px; color:var(--gray-400); margin-bottom:18px; }
    .acard-metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; padding-top:16px; border-top:1px solid var(--gray-100); }
    .metric { text-align:center; }
    .metric-lbl { font-size:10px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:4px; }
    .metric-val { font-size:16px; font-weight:800; letter-spacing:-0.5px; }
    .c-green { color:var(--green); }
    .c-yellow { color:#92400E; }
    .c-red { color:var(--red); }
    .c-black { color:var(--black); }

    /* ── EMPTY ── */
    .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--gray-600); }
    .empty .eicon { font-size:52px; margin-bottom:16px; }
    .empty h3 { font-size:20px; font-weight:800; color:var(--black); margin-bottom:8px; }

    /* ── PAGINATION ── */
    .pages { display:flex; justify-content:center; gap:8px; padding:40px 0 0; }
    .pgt { background:white; border:1.5px solid var(--gray-200); border-radius:9px; color:var(--black); font-size:13px; font-weight:700; padding:9px 17px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .pgt:hover,.pgt.on { background:var(--black); color:white; border-color:var(--black); }
    .pgt:disabled { opacity:0.3; cursor:not-allowed; }

    /* ── MODAL ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:none; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(6px); }
    .overlay.on { display:flex; }
    .modal { background:white; border-radius:22px; width:100%; max-width:880px; max-height:92vh; overflow-y:auto; position:relative; animation:mIn 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes mIn { from{opacity:0;transform:scale(0.94) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .mhdr { height:210px; position:relative; display:flex; align-items:flex-end; padding:26px; border-radius:22px 22px 0 0; overflow:hidden; }
    .mhdr .mdistrict { position:absolute; bottom:-16px; right:20px; font-size:110px; font-weight:900; color:rgba(255,255,255,0.14); line-height:1; user-select:none; }
    .mhdr-info { position:relative; z-index:1; }
    .mctag { background:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.45); color:white; font-size:11px; font-weight:700; padding:3px 11px; border-radius:20px; display:inline-block; margin-bottom:8px; letter-spacing:0.4px; }
    .mtitle { color:white; font-size:22px; font-weight:800; letter-spacing:-0.5px; line-height:1.3; }
    .mclose { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.22); border:none; border-radius:9px; color:white; width:38px; height:38px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; z-index:2; backdrop-filter:blur(4px); }
    .mclose:hover { background:rgba(255,255,255,0.4); }
    .mbody { padding:28px; }
    .mgrid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
    .iblock { background:var(--gray-50); border-radius:13px; padding:20px; }
    .iblock.full { grid-column:1/-1; }
    .iblock-ttl { font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px; }
    .irow { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--gray-200); }
    .irow:last-child { border-bottom:none; }
    .irow .ik { font-size:13px; color:var(--gray-600); font-weight:500; }
    .irow .iv { font-size:13px; font-weight:700; }
    .score-item { margin-bottom:13px; }
    .score-item:last-child { margin-bottom:0; }
    .score-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .score-lbl { font-size:13px; font-weight:600; }
    .score-tag { font-size:12px; font-weight:700; padding:2px 10px; border-radius:20px; }
    .sh { background:var(--green-bg); color:var(--green); }
    .sm { background:var(--orange-bg); color:var(--orange); }
    .sl { background:var(--red-bg); color:var(--red); }
    .sbar-bg { background:var(--gray-200); border-radius:4px; height:6px; overflow:hidden; }
    .sbar-fill { height:100%; border-radius:4px; }
    .fh { background:var(--green); }
    .fm { background:var(--orange); }
    .fl { background:var(--red); }
    .score-reason { font-size:11px; color:var(--gray-600); margin-top:4px; }
    .risk-list { list-style:none; }
    .risk-li { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--gray-200); font-size:13px; }
    .risk-li:last-child { border-bottom:none; }
    .risk-ico { font-size:15px; flex-shrink:0; margin-top:1px; }
    .risk-main { font-weight:600; }
    .risk-desc { color:var(--gray-600); font-size:12px; }
    .opinion-box { background:var(--black); border-radius:13px; padding:22px; }
    .op-lbl { font-size:11px; font-weight:700; color:var(--yellow); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .op-txt { font-size:15px; font-weight:600; color:white; line-height:1.65; letter-spacing:-0.2px; }
    .mfooter { display:flex; gap:12px; padding:0 28px 28px; }
    .mbtn-dark { flex:1; background:var(--black); color:white; border:none; border-radius:12px; font-size:14px; font-weight:700; padding:15px; cursor:pointer; text-decoration:none; text-align:center; display:block; font-family:inherit; }
    .mbtn-light { flex:1; background:var(--gray-50); color:var(--black); border:1.5px solid var(--gray-200); border-radius:12px; font-size:14px; font-weight:700; padding:15px; cursor:pointer; font-family:inherit; }

    /* ── FOOTER ── */
    footer { border-top:1px solid var(--gray-200); padding:24px 48px; text-align:center; font-size:12px; color:var(--gray-400); }
    footer a { color:var(--black); font-weight:700; text-decoration:none; }

    @media(max-width:768px){
      .hero{padding:56px 20px 44px} .hero-h1{font-size:38px;letter-spacing:-1.5px}
      nav,.fbar,.cards-wrap{padding-left:20px;padding-right:20px}
      .mgrid{grid-template-columns:1fr} .hero-kpi{gap:24px}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">🏠</div>
    경매대시보드
  </a>
  <div class="nav-right">
    <span class="nav-pill" id="nav-today">오늘 0건 업데이트</span>
    <a class="nav-cta" href="https://www.courtauction.go.kr" target="_blank">대법원 바로가기 →</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-chip">✦ <span id="hero-date">-</span> 기준 최신 데이터</div>
    <h1 class="hero-h1">서울 아파트<br><span class="light">경매 대시보드</span></h1>
    <p class="hero-sub">매일 아침 서울 <strong>5개 법원</strong> 경매 매물을 자동 수집·분석<br>최저입찰가 <strong>4억 원 이상</strong> 아파트만 선별</p>
    <div class="hero-kpi">
      <div class="kpi"><div class="kpi-num" id="ks-total">-</div><div class="kpi-lbl">총 누적 물건</div></div>
      <div class="kpi"><div class="kpi-num" id="ks-today">-</div><div class="kpi-lbl">오늘 신규</div></div>
      <div class="kpi"><div class="kpi-num" id="ks-avg">-</div><div class="kpi-lbl">평균 최저가 (억)</div></div>
      <div class="kpi"><div class="kpi-num" id="ks-week">-</div><div class="kpi-lbl">이번 주 경매</div></div>
    </div>
    <div class="hero-btns">
      <button class="btn-dark" onclick="goToday()">오늘 신규 매물 ↓</button>
      <button class="btn-outline" onclick="goAll()">전체 보기</button>
    </div>
  </div>
</section>

<!-- FILTER BAR -->
<div class="fbar">
  <div class="fbar-left">
    <select class="fsel" id="fc-court">
      <option value="">전체 법원</option>
      <option>서울중앙지방법원</option><option>서울동부지방법원</option>
      <option>서울남부지방법원</option><option>서울북부지방법원</option><option>서울서부지방법원</option>
    </select>
    <select class="fsel" id="fc-failed">
      <option value="">유찰 전체</option>
      <option value="0">신건 (0회)</option>
      <option value="1">1회 이상</option>
      <option value="3">3회 이상</option>
      <option value="5">5회 이상</option>
    </select>
    <select class="fsel" id="fc-date">
      <option value="">날짜 전체</option>
      <option value="today">오늘 신규만</option>
    </select>
    <input class="fsearch" type="text" id="fc-q" placeholder="🔍  주소, 사건번호 검색..." />
  </div>
  <div class="fbar-right">
    <span class="fcount" id="fc-cnt">0건</span>
    <button class="btn-reset" onclick="resetF()">↺ 초기화</button>
  </div>
</div>

<!-- CARDS -->
<main class="cards-wrap" id="cards-wrap">
  <div class="sec-head">
    <span class="sec-title" id="sec-title">오늘의 신규 매물</span>
    <span class="sec-sub" id="sec-sub">-</span>
  </div>
  <div class="card-grid" id="card-grid"></div>
  <div class="pages" id="pages"></div>
</main>

<footer>
  데이터 출처: <a href="https://www.courtauction.go.kr" target="_blank">대법원 법원경매정보</a> &nbsp;·&nbsp;
  매일 평일 오전 9시 자동 업데이트 &nbsp;·&nbsp; 투자 판단은 본인 책임
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeByBg(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
let ALL=[],FILT=[];
let pg=1;const PG=12;

async function init(){
  try{
    const r=await fetch('../data/auctions.json?t='+Date.now());
    const d=await r.json();
    ALL=d.auctions||[];
  }catch(e){ ALL=demo(); }
  const t=tstr();
  document.getElementById('hero-date').textContent=t;
  const todayN=ALL.filter(a=>a.scraped_date===t).length;
  const avg=ALL.length?(ALL.reduce((s,a)=>s+(a.min_bid||0),0)/ALL.length/1e8).toFixed(1):'-';
  const now=new Date(),we=new Date(now); we.setDate(now.getDate()+7);
  const wk=ALL.filter(a=>{const d=new Date(a.auction_date);return d>=now&&d<=we;}).length;
  set('ks-total',ALL.length.toLocaleString());
  set('ks-today',todayN);
  set('ks-avg',avg);
  set('ks-week',wk);
  set('nav-today',`오늘 ${todayN}건 업데이트`);
  applyF();
}

function applyF(){
  const court=v('fc-court'),failed=v('fc-failed'),dateF=v('fc-date'),q=v('fc-q').toLowerCase();
  const today=tstr();
  FILT=ALL.filter(a=>{
    if(court&&a.court!==court)return false;
    if(failed!==''&&(a.failed_bids||0)<+failed)return false;
    if(dateF==='today'&&a.scraped_date!==today)return false;
    if(q&&!(a.id+a.court+a.address).toLowerCase().includes(q))return false;
    return true;
  });
  FILT.sort((a,b)=>{
    if(b.scraped_date!==a.scraped_date)return b.scraped_date.localeCompare(a.scraped_date);
    return(a.auction_date||'').localeCompare(b.auction_date||'');
  });
  pg=1;
  set('fc-cnt',FILT.length+'건');
  renderCards(); renderPages(); loadCardImages();
}

function goToday(){ set('fc-date','today'); applyF(); scroll2(); }
function goAll()  { set('fc-date','');      applyF(); scroll2(); }
function resetF() { ['fc-court','fc-failed','fc-date','fc-q'].forEach(id=>set(id,'')); applyF(); }
function scroll2(){ document.getElementById('cards-wrap').scrollIntoView({behavior:'smooth'}); }

function renderCards(){
  const grid=document.getElementById('card-grid');
  const today=tstr();
  const dateF=v('fc-date');
  set('sec-title', dateF==='today'?'오늘의 신규 매물':'전체 경매 매물');
  set('sec-sub',`총 ${FILT.length}건`);
  const slice=FILT.slice((pg-1)*PG, pg*PG);

  if(!slice.length){
    grid.innerHTML=`<div class="empty"><div class="eicon">🔍</div><h3>조건에 맞는 매물이 없어요</h3><p>필터를 초기화하거나 조건을 변경해 보세요.</p></div>`;
    return;
  }

  grid.innerHTML=slice.map(a=>{
    const isNew=a.scraped_date===today;
    const days=daysTo(a.auction_date);
    const dist=getDist(a.address);
    const parts=(a.address||'').split(' ');
    const am=parts.slice(0,4).join(' ');
    const as2=parts.slice(4).join(' ');
    const court=(a.court||'').replace('서울','서울 ').replace('지방법원','');
    let ddHtml='';
    if(days!==null&&days>=0){

function renderPages(){
  const total=Math.ceil(FILT.length/PG);
  const el=document.getElementById('pages');
  if(total<=1){el.innerHTML='';return;}
  let h=`<button class="pgt" onclick="goPg(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
  for(let i=Math.max(1,pg-2);i<=Math.min(total,pg+2);i++)
    h+=`<button class="pgt ${i===pg?'on':''}" onclick="goPg(${i})">${i}</button>`;
  h+=`<button class="pgt" onclick="goPg(${pg+1})" ${pg===total?'disabled':''}>›</button>`;
  el.innerHTML=h;
}
function goPg(n){
  const t=Math.ceil(FILT.length/PG);
  if(n<1||n>t)return;
  pg=n; renderCards(); renderPages(); loadCardImages();

}

/* ── Helpers ── */
function calcROI(a){
  const bid=a.min_bid||0, app=a.appraisal||bid*3;
  const tax=bid<=600000000?bid*0.011:bid<=900000000?bid*0.025:bid*0.035;
  const etc=20000000;
  const cost=Math.round(bid+tax+etc);
  const ff=Math.max(0.55,0.85-(a.failed_bids||0)*0.05);
  const est=Math.round(app*ff);
  const margin=est-cost;
  const rate=cost>0?Math.round(margin/cost*100):0;
  return{tax:Math.round(tax),etc,cost,est,margin,rate};
}
function getInfra(addr){
  const a=addr||'';
  const hi=['강남구','서초구','송파구','용산구'];
  const md=['마포구','성동구','동작구','광진구','영등포구','강동구','양천구','강서구','은평구','서대문구'];
  let tier=hi.some(g=>a.includes(g))?'h':md.some(g=>a.includes(g))?'m':'l';
  return {
    h:[{s:'상',r:'지하철 다중 노선, 강남 접근 10분 이내'},{s:'상',r:'백화점·대형마트·상급 병원 인접'},{s:'상',r:'강남 최상위 학군, 대치동 학원가'}],
    m:[{s:'상',r:'지하철 1~2개 노선, 교통 양호'},{s:'중',r:'편의시설 평균 이상 수준'},{s:'중',r:'학군 평균 수준'}],
    l:[{s:'중',r:'지하철 인접, 환승 다소 불편'},{s:'중',r:'근린 편의시설 기본 충족'},{s:'중',r:'학군 보통 수준'}],
  }[tier];
}
function getRisks(a){
  return[
    {i:a.failed_bids>=5?'🔴':a.failed_bids>=3?'🟠':'🟢',t:`유찰 ${a.failed_bids||0}회`,d:a.failed_bids>=5?'5회+ — 권리 하자·시세 괴리 강력 의심, 원인 미해소 시 입찰 금지':a.failed_bids>=3?'3회+ — 유찰 원인 반드시 확인 필요':'신건 — 경쟁 입찰 예상'},
    {i:'🟡',t:'명도 리스크',d:'점유자·임차인 현황 현장 확인, 인도명령 가능 여부 체크'},
    {i:'🟡',t:'미납 관리비',d:'관리사무소 직접 확인 — 장기 유찰 시 수백만 원 누적 가능'},
    {i:'🟠',t:'선순위 권리',d:'등기부등본 전체 열람 — 가처분·가등기·유치권 신고 여부'},
    {i:'🔵',t:'대출 LTV 규제',d:'규제지역 여부 확인 필수 — 투기과열지구 LTV 40~50% 제한'},
  ];
}
function getOpinion(a,roi){
  const f=a.failed_bids||0,r=roi.rate;
  if(f>=5&&r<10)return `"${f}회 유찰에 실질 수익률 ${r}% — 원인 불명의 유찰은 독약이다. 권리분석 없이는 절대 입찰하지 마라."`;
  if(f>=3&&r>=20)return `"${f}회 유찰로 감정가 대비 크게 하락. 권리 하자가 없다면 ${r}% 수익률은 충분히 매력적 — 매각물건명세서를 정독하고 접근하라."`;
  if(f===0&&r>=15)return `"신건이라 경쟁이 치열할 것. 시세 대비 여유 있는 구간이나 입찰 상한가를 철저히 계산하고 들어가야 한다."`;
  if(r>=25)return `"입지와 수익률 모두 양호한 물건. 현장 방문과 권리분석만 마치면 입찰 검토 가치가 충분하다."`;
  if(r>=10)return `"수익률은 적정 수준. 추가 경쟁자 예상 — 감정적 상한가 설정 없이 냉정하게 접근하라."`;
  return `"현 최저가 기준 수익률이 낮다. 인근 실거래가를 재확인하고 매력도를 재평가하라."`;
}
function grad(a){
  const r=a.bid_ratio||80,f=a.failed_bids||0;
  if(r<50||f>=5)return'linear-gradient(135deg,#1e3a5f,#2563EB)';
  if(r<70)return'linear-gradient(135deg,#14532d,#16a34a)';
  if(r<85)return'linear-gradient(135deg,#78350f,#d97706)';
  return'linear-gradient(135deg,#1A1A1A,#374151)';
}
function getDist(a){ if(!a)return'서울'; const m=(a||'').match(/([가-힣]+구)/); return m?m[1].replace('구',''):'서울'; }
function fmt(n){ if(!n)return'-'; if(n>=1e8)return(n/1e8).toFixed(1)+'억'; if(n>=1e4)return Math.round(n/1e4)+'만원'; return n.toLocaleString()+'원'; }
function daysTo(ds){ if(!ds)return null; const now=new Date(); now.setHours(0,0,0,0); return Math.round((new Date(ds)-now)/86400000); }
function rc(r){ return r==null?'c-black':r<70?'c-green':r<90?'c-yellow':'c-red'; }

/* ── 카카오맵 위성사진 ── */
const KAKAO_KEY='fb4b539cf2855399d173b666f110f1e8';
const geoCache={};
let kakaoReady=false;

function initKakao(){
  return new Promise(resolve=>{
    if(kakaoReady)return resolve();
    kakao.maps.load(()=>{ kakaoReady=true; resolve(); });
  });
}

function cleanAddr(addr){
  // 층/호 제거, 주요 주소만 남기기 (동번지까지)
  if(!addr)return '';
  return addr.replace(/\s+\d+층.*$/,'').replace(/\s+\d+동\s+\d+호.*/,'').trim();
}

async function geocodeAddress(addr){
  const key=cleanAddr(addr);
  if(!key)return null;
  if(geoCache[key]!==undefined)return geoCache[key];
  await initKakao();
  return new Promise(resolve=>{
    const gc=new kakao.maps.services.Geocoder();
    gc.addressSearch(key,(result,status)=>{
      if(status===kakao.maps.services.Status.OK&&result.length>0){
        const c={lat:parseFloat(result[0].y),lng:parseFloat(result[0].x)};
        geoCache[key]=c; resolve(c);
      } else { geoCache[key]=null; resolve(null); }
    });
  });
}

function skyUrl(lat,lng){
  const m=encodeURIComponent(`type:circle|pos:${lng} ${lat}|size:medium|color:red`);
  return `https://dapi.kakao.com/v2/maps/staticmap?appkey=${KAKAO_KEY}&center=${lng},${lat}&level=3&size=600x380&map_type=skyview&markers=${m}`;
}

async function loadCardImages(){
  const cards=document.querySelectorAll('.acard-img[data-addr]');
  for(const el of cards){
    const addr=el.getAttribute('data-addr');
    if(!addr)continue;
    const coords=await geocodeAddress(addr);
    if(coords){
      el.style.transition='background-image 0.4s ease';
      el.style.backgroundImage=`url("${skyUrl(coords.lat,coords.lng)}")`;
      el.style.backgroundSize='cover';
      el.style.backgroundPosition='center';
    }
  }
}
