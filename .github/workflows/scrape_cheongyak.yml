name: 청약 데이터 자동 수집

on:
  schedule:
    - cron: '30 0 * * 1-5'   # 평일 오전 9시 30분 (KST)
    - cron: '30 3 * * 1-5'   # 평일 오후 12시 30분 (KST)
    - cron: '30 6 * * 1-5'   # 평일 오후 3시 30분 (KST)
    - cron: '30 9 * * 1-5'   # 평일 오후 6시 30분 (KST)
  workflow_dispatch:           # 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run 청약 scraper
        env:
          CHEONGYAK_API_KEY: ${{ secrets.CHEONGYAK_API_KEY }}
        run: python scraper/scrape_cheongyak.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cheongyak.json
          git diff --staged --quiet || git commit -m "chore: 청약 데이터 업데이트 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
