name: 경매 스크래퍼

on:
  schedule:
    # 매일 평일 오전 9시 KST (00:00 UTC)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:   # 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run auction scraper
        run: |
          python scraper/scrape_auctions.py
        timeout-minutes: 15

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auctions.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: 경매 데이터 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
